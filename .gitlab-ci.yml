image: python:3.12-slim

stages:
  - contract-tests
  - handoff-tests
  - session-replay
  - full-agent-workflows

variables:
  PYTHONPATH: "."

before_script:
  - pip install -r requirements.txt
  - pip install pytest pytest-asyncio pydantic httpx requests python-dotenv sqlmodel

contract-tests:
  stage: contract-tests
  timeout: 5m
  script:
    - pytest tests/contracts/

handoff-tests:
  stage: handoff-tests
  timeout: 10m
  script:
    - pytest tests/workflows/ -m "not full_agent"

session-replay:
  stage: session-replay
  timeout: 15m
  script:
    - pytest tests/fixtures/sessions/

full-agent-workflows:
  stage: full-agent-workflows
  timeout: 30m
  script:
    - pytest tests/workflows/ -m "full_agent"
    - python3 scripts/evaluate_token_usage.py --max-cost-usd 2.0
