version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_APP=app_enhanced.py
      - FLASK_ENV=development
      - PYTHONPATH=/app
      - SECRET_KEY=dummy_secret_for_sandbox
      - EBAY_APP_ID=${EBAY_APP_ID:-mock}
      - EBAY_CERT_ID=${EBAY_CERT_ID:-mock}
    # WSLENV allows secrets to pass through securely to the container without .env files
    # Assuming docker-compose is run with these environment variables naturally inherited
